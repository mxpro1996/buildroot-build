name: Build ARM32 Static Dependencies

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      PREFIX: ${{ github.workspace }}/install
      TOOLCHAIN: arm-linux-gnueabihf

    steps:

    ############################################################
    # Download Linaro Toolchain
    ############################################################

    - name: Download Linaro GCC
      run: |
        wget https://developer.arm.com/-/cdn-downloads/permalink/legacy-linaro-gnu-toolchains/7.5-2019.12/gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabihf.tar.xz
        tar xf gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabihf.tar.xz

    - name: Setup toolchain env
      run: |
        echo "TOOLCHAIN_DIR=$PWD/gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabihf" >> $GITHUB_ENV

    ############################################################
    # Install build tools
    ############################################################

    - name: Install build deps
      run: |
        sudo apt update
        sudo apt install -y \
          autoconf automake libtool pkg-config \
          make wget unzip gettext autopoint

    ############################################################
    # Setup PATH
    ############################################################

    - name: Setup PATH
      run: |
        echo "$TOOLCHAIN_DIR/bin" >> $GITHUB_PATH

    ############################################################
    # Export compiler
    ############################################################

    - name: Export cross compile tools
      run: |
        echo "CC=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
        echo "CXX=arm-linux-gnueabihf-g++" >> $GITHUB_ENV
        echo "AR=arm-linux-gnueabihf-ar" >> $GITHUB_ENV
        echo "LD=arm-linux-gnueabihf-ld" >> $GITHUB_ENV
        echo "RANLIB=arm-linux-gnueabihf-ranlib" >> $GITHUB_ENV
        echo "STRIP=arm-linux-gnueabihf-strip" >> $GITHUB_ENV

    ############################################################
    # Prepare dirs
    ############################################################

    - name: Prepare dirs
      run: |
        mkdir -p $PREFIX

    ############################################################
    # libiconv
    ############################################################

    - name: Build libiconv
      run: |
        wget https://ftp.gnu.org/pub/gnu/libiconv/libiconv-1.17.tar.gz
        tar xf libiconv-1.17.tar.gz
        cd libiconv-1.17

        ./configure \
          --host=$TOOLCHAIN \
          --prefix=$PREFIX \
          --enable-static \
          --disable-shared

        make -j$(nproc)
        make install

    ############################################################
    # OpenSSL
    ############################################################

    - name: Build OpenSSL
      run: |
        wget https://www.openssl.org/source/openssl-1.1.1w.tar.gz
        tar xf openssl-1.1.1w.tar.gz
        cd openssl-1.1.1w

        ./Configure linux-armv4 \
          --prefix=$PREFIX \
          --cross-compile-prefix=arm-linux-gnueabihf- \
          no-shared \
          no-tests

        make -j$(nproc)
        make install_sw

    ############################################################
    # curl
    ############################################################

    - name: Build curl
      run: |
        wget https://curl.se/download/curl-7.88.1.tar.gz
        tar xf curl-7.88.1.tar.gz
        cd curl-7.88.1

        export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
        export CPPFLAGS="-I$PREFIX/include"
        export LDFLAGS="-L$PREFIX/lib"
        export LIBS="-lssl -lcrypto -ldl -lpthread"

        ./configure \
          --build=x86_64-linux-gnu \
          --host=$TOOLCHAIN \
          --prefix=$PREFIX \
          --with-openssl \
          --enable-static \
          --disable-shared \
          --without-brotli \
          --without-zstd \
          --without-zlib \
          --disable-ldap \
          --disable-rtsp \
          --disable-dict \
          --disable-telnet \
          --disable-tftp \
          --disable-pop3 \
          --disable-imap \
          --disable-smtp \
          --disable-gopher \
          --disable-smb

        make -j$(nproc)
        make install

    ############################################################
    # ZBar
    ############################################################

    - name: Build ZBar
      run: |
        wget https://github.com/mchehab/zbar/archive/refs/tags/0.23.90.tar.gz
        tar xf 0.23.90.tar.gz
        cd zbar-0.23.90

        autoreconf -vfi

        export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
        export CPPFLAGS="-I$PREFIX/include"
        export LDFLAGS="-L$PREFIX/lib"
        export LIBS="-liconv"

        ./configure \
          --host=$TOOLCHAIN \
          --prefix=$PREFIX \
          --enable-static \
          --disable-shared \
          --disable-video \
          --without-x \
          --without-xshm \
          --without-gtk \
          --without-qt \
          --without-python \
          --without-imagemagick \
          --without-dbus \
          --enable-codes=qrcode,ean,code128

        make -j$(nproc)
        make install

    ############################################################
    # Package
    ############################################################

    - name: Remove shared libs
      run: |
        find $PREFIX -name "*.so*" -delete

    - name: Package
      run: |
        cd $PREFIX
        tar czf ../arm32-static-sdk.tar.gz .

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: arm32-static-sdk
        path: arm32-static-sdk.tar.gz
