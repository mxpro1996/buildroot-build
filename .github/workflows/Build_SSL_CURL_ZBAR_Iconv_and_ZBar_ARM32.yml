name: Build ARM32 Static Dependencies

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      PREFIX: ${{ github.workspace }}/install
      TOOLCHAIN: arm-linux-gnueabihf
      MAKEFLAGS: -j$(nproc)

    steps:

    - name: Install toolchain
      run: |
        sudo apt update
        sudo apt install -y \
          gcc-arm-linux-gnueabihf \
          g++-arm-linux-gnueabihf \
          binutils-arm-linux-gnueabihf \
          autoconf automake libtool pkg-config \
          make wget unzip gettext autopoint

    - name: Prepare directories
      run: |
        mkdir -p $PREFIX

    ############################################################
    # libiconv
    ############################################################

    - name: Build libiconv
      run: |
        wget https://ftp.gnu.org/pub/gnu/libiconv/libiconv-1.17.tar.gz
        tar xf libiconv-1.17.tar.gz
        cd libiconv-1.17

        ./configure \
          --host=$TOOLCHAIN \
          --prefix=$PREFIX \
          --enable-static \
          --disable-shared \
          --with-pic

        make
        make install

    ############################################################
    # OpenSSL
    ############################################################

    - name: Build OpenSSL
      run: |
        wget https://www.openssl.org/source/openssl-1.1.1w.tar.gz
        tar xf openssl-1.1.1w.tar.gz
        cd openssl-1.1.1w

        ./Configure linux-generic32 \
          --prefix=$PREFIX \
          --cross-compile-prefix=$TOOLCHAIN- \
          no-shared \
          no-tests

        make
        make install_sw

    ############################################################
    # curl
    ############################################################

    - name: Build curl
      run: |
        wget https://curl.se/download/curl-7.88.1.tar.gz
        tar xf curl-7.88.1.tar.gz
        cd curl-7.88.1

        export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
        export CPPFLAGS="-I$PREFIX/include"
        export LDFLAGS="-L$PREFIX/lib"
        export LIBS="-lssl -lcrypto -ldl -lpthread"

        ./configure \
          --build=x86_64-linux-gnu \
          --host=$TOOLCHAIN \
          --prefix=$PREFIX \
          --with-openssl \
          --enable-static \
          --disable-shared \
          --disable-ldap \
          --disable-rtsp \
          --disable-dict \
          --disable-telnet \
          --disable-tftp \
          --disable-pop3 \
          --disable-imap \
          --disable-smtp \
          --disable-gopher \
          --disable-smb \
          --without-zlib

        make
        make install

    ############################################################
    # zbar
    ############################################################

    - name: Build ZBar
      run: |
        wget https://github.com/mchehab/zbar/archive/refs/tags/0.23.90.tar.gz
        tar xf 0.23.90.tar.gz
        cd zbar-0.23.90

        autoreconf -vfi

        export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
        export CPPFLAGS="-I$PREFIX/include"
        export LDFLAGS="-L$PREFIX/lib"
        export LIBS="-liconv"

        ./configure \
          --host=$TOOLCHAIN \
          --prefix=$PREFIX \
          --enable-static \
          --disable-shared \
          --without-gtk \
          --without-python \
          --without-qt \
          --without-imagemagick \
          --without-dbus \
          --disable-video

        make
        make install

    ############################################################
    # package
    ############################################################

    - name: Strip shared libs
      run: |
        find $PREFIX -name "*.so*" -delete

    - name: Package
      run: |
        cd $PREFIX
        tar czf ../arm32-static-libs.tar.gz .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: arm32-static-libs
        path: arm32-static-libs.tar.gz
